name: Daily Notes Reminder

on:
  schedule:
    # Daily run at 9PM America/Chicago year-round.
    # GitHub cron is UTC, so schedule both DST/standard candidates and gate in-job.
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
    # Weekly summary on Sunday 9AM America/Chicago year-round.
    - cron: '0 14 * * 0'
    - cron: '0 15 * * 0'
  workflow_dispatch:

jobs:
  daily-reminder:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - school: westu-sor
            to: "huscott@schoolofrock.com vscott@schoolofrock.com cabarnhill@schoolofrock.com"
          - school: theheights-sor
            to: "huscott@schoolofrock.com vscott@schoolofrock.com ndees@schoolofrock.com agarza@schoolofrock.com"
    steps:
      - uses: actions/checkout@v6

      - name: Decide whether this daily run should execute
        id: daily_gate
        run: |
          python - <<'PY'
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          import os

          tz = ZoneInfo("America/Chicago")
          now = datetime.now(tz)
          target = now.date() - timedelta(days=1)
          should_run = "true"

          if os.environ.get("GITHUB_EVENT_NAME") == "schedule":
              should_run = "true" if (now.hour == 21 and now.weekday() <= 5) else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              print(f"should_run={should_run}", file=f)
              print(f"start_date={target}", file=f)
              print(f"end_date={target}", file=f)
              print(f"local_time={now.isoformat(timespec='seconds')}", file=f)
          PY
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Log skipped daily run
        if: ${{ steps.daily_gate.outputs.should_run != 'true' }}
        run: |
          echo "Skipping daily run at local time ${{ steps.daily_gate.outputs.local_time }}"

      - uses: actions/setup-python@v5
        if: ${{ steps.daily_gate.outputs.should_run == 'true' }}
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: ${{ steps.daily_gate.outputs.should_run == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run daily reminder
        if: ${{ steps.daily_gate.outputs.should_run == 'true' }}
        env:
          PIKE13_USER: ${{ secrets.PIKE13_USER }}
          PIKE13_PASSWORD: ${{ secrets.PIKE13_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: |
          python run_daily.py \
            --school ${{ matrix.school }} \
            --start-date ${{ steps.daily_gate.outputs.start_date }} \
            --end-date ${{ steps.daily_gate.outputs.end_date }} \
            --summary both \
            --to ${{ matrix.to }}

  weekly-reminder:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - school: westu-sor
            to: "huscott@schoolofrock.com vscott@schoolofrock.com cabarnhill@schoolofrock.com"
          - school: theheights-sor
            to: "huscott@schoolofrock.com vscott@schoolofrock.com ndees@schoolofrock.com"
    steps:
      - uses: actions/checkout@v6

      - name: Decide whether this weekly run should execute
        id: weekly_gate
        run: |
          python - <<'PY'
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          import os

          tz = ZoneInfo("America/Chicago")
          now = datetime.now(tz)
          end_date = now.date() - timedelta(days=1)
          start_date = end_date - timedelta(days=5)
          should_run = "true"

          if os.environ.get("GITHUB_EVENT_NAME") == "schedule":
              should_run = "true" if (now.hour == 9 and now.weekday() == 6) else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              print(f"should_run={should_run}", file=f)
              print(f"start_date={start_date}", file=f)
              print(f"end_date={end_date}", file=f)
              print(f"local_time={now.isoformat(timespec='seconds')}", file=f)
          PY
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Log skipped weekly run
        if: ${{ steps.weekly_gate.outputs.should_run != 'true' }}
        run: |
          echo "Skipping weekly run at local time ${{ steps.weekly_gate.outputs.local_time }}"

      - uses: actions/setup-python@v5
        if: ${{ steps.weekly_gate.outputs.should_run == 'true' }}
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: ${{ steps.weekly_gate.outputs.should_run == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run weekly reminder
        if: ${{ steps.weekly_gate.outputs.should_run == 'true' }}
        env:
          PIKE13_USER: ${{ secrets.PIKE13_USER }}
          PIKE13_PASSWORD: ${{ secrets.PIKE13_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: |
          python run_daily.py \
            --school ${{ matrix.school }} \
            --start-date ${{ steps.weekly_gate.outputs.start_date }} \
            --end-date ${{ steps.weekly_gate.outputs.end_date }} \
            --summary both \
            --to ${{ matrix.to }}
